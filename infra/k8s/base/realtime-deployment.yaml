apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime
  labels: { app: realtime }
spec:
  replicas: 2
  selector:
    matchLabels: { app: realtime }
  template:
    metadata:
      labels: { app: realtime }
    spec:
      containers:
        - name: realtime
          image: ghcr.io/your-org/mvs-realtime:latest # patched per overlay
          ports:
            - containerPort: 4001
          envFrom:
            - secretRef: { name: mvs-secrets }
          env:
            - { name: NODE_ENV, value: production }
            - { name: REALTIME_PORT, value: '4001' }
          readinessProbe:
            httpGet: { path: /health, port: 4001 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: 150m, memory: 256Mi }
            limits: { cpu: '1', memory: 512Mi }
