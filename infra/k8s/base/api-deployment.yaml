apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels: { app: api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/mvs-api:latest # patched per overlay
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef: { name: mvs-secrets }
          env:
            - { name: NODE_ENV, value: production }
            - { name: API_PORT, value: '4000' }
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: '1', memory: 512Mi }
