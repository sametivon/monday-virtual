name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Dummy values: typecheck/test never open a DB connection, but Prisma's
    # `generate` (run via turbo's ^build) requires the datasource env vars to be
    # *defined*, and the web env guard wants non-localhost public URLs. The real
    # app builds run on Vercel (web) and Render (api/realtime) via their own Git
    # integrations — CI here is just a fast correctness gate.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      DIRECT_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXT_PUBLIC_API_URL: https://ci.invalid
      NEXT_PUBLIC_REALTIME_URL: https://ci.invalid
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      # No `cache: pnpm` here — setup-node's pnpm-store detection fails in CI
      # (it's the step that was dying). Caching is a speed-only optimization.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      # turbo's ^build dependency builds the workspace libs first (incl. the
      # Prisma client), so an explicit generate step isn't needed.
      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
