name: Deploy

# MANUAL-ONLY. Production deploys are handled natively: web on Vercel and
# api/realtime on Render, each via its own GitHub integration (push to main
# auto-deploys there). This workflow is the OPTIONAL self-host / K8s path —
# build + push container images and run DB migrations — so it runs only when
# triggered by hand, not on every push.
on:
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/mvs

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, realtime, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: pnpm install --frozen-lockfile=false
      - name: Generate Prisma client
        run: pnpm --filter @mvs/db generate
      - name: Apply migrations
        env:
          # migrate deploy uses directUrl (unpooled) when set; runtime uses the pooled DATABASE_URL.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
        run: pnpm --filter @mvs/db migrate:deploy

  # deploy:
  #   needs: [images, migrate]
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: kubectl apply (kustomize prod overlay)
  #       run: kubectl apply -k infra/k8s/overlays/prod
  #   (wire kubeconfig secret + cluster context to enable)
